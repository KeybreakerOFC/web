<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JXLL | Secure Access</title>
    <style>
        /* --- Configuración del Sistema y Pantallas AMOLED (Samsung) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Elimina parpadeo táctil en Android */
        }

        body {
            /* Negro puro para pantallas AMOLED (ahorro de energía y contraste infinito) */
            background-color: #000000; 
            height: 100vh;
            /* Soporte para el "notch" o perforación de cámara en dispositivos Samsung modernos */
            height: calc(100vh - env(safe-area-inset-bottom, 0px));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            perspective: 1200px;
        }

        /* --- Contenedor Adaptable --- */
        .loader-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* --- El Cubo 3D con Soporte de Hardware 120Hz --- */
        .scene-3d {
            width: 100px;
            height: 100px;
            perspective: 1200px;
            margin-bottom: 40px;
        }

        .cube-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Fuerza la aceleración por GPU en navegadores móviles de Samsung (One UI) */
            will-change: transform; 
            transform: rotateX(-20deg) rotateY(25deg);
            transition: transform 0.1s ease-out; /* Suavizado para el movimiento del mouse en PC */
        }

        /* Animación automática por defecto (para móvil o si no se mueve el mouse) */
        .cube-3d.auto-rotate {
            animation: rotateCube 4s infinite linear;
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(5, 5, 5, 0.85);
            border: 2px solid #ff0044;
            /* Brillo optimizado: se ve increíble en paneles Samsung y pantallas de PC IPS/OLED */
            box-shadow: 0 0 25px rgba(255, 0, 68, 0.5), inset 0 0 15px rgba(255, 0, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff0044;
            font-size: 1.2rem;
        }

        /* Coordenadas del Cubo Estricto 3D */
        .face-front  { transform: translateZ(50px); }
        .face-back   { transform: rotateY(180deg) translateZ(50px); }
        .face-left   { transform: rotateY(-90deg) translateZ(50px); }
        .face-right  { transform: rotateY(90deg) translateZ(50px); }
        .face-top    { transform: rotateX(90deg) translateZ(50px); }
        .face-bottom { transform: rotateX(-90deg) translateZ(50px); }

        /* --- Branding JXLL --- */
        .brand-text {
            color: #ffffff;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-left: 12px; /* Compensa el letter-spacing del final */
        }

        /* --- Barra de Progreso Dinámica --- */
        .progress-bar-container {
            width: 80%;
            max-width: 300px;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff0044, #ff5500);
            box-shadow: 0 0 15px #ff0044;
            transition: width 0.15s ease-out;
        }

        .status-text {
            color: #888888;
            font-size: 0.75rem;
            margin-top: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            text-align: center;
            height: 20px;
        }

        /* --- OPTIMIZACIONES ESPECÍFICAS POR DISPOSITIVO --- */

        /* Para PC / Escritorio (Pantallas Grandes) */
        @media (min-width: 1024px) {
            .brand-text {
                font-size: 3.5rem;
                letter-spacing: 16px;
            }
            .progress-bar-container {
                max-width: 380px;
                height: 6px;
            }
            .status-text {
                font-size: 0.85rem;
            }
        }

        /* Para Móviles Android / Samsung (Pantallas Verticales y Relaciones de Aspecto Altas 19.5:9 o 20:9) */
        @media (max-width: 768px) and (orientation: portrait) {
            .scene-3d {
                width: 90px;
                height: 90px;
                margin-bottom: 50px;
            }
            .face-front  { transform: translateZ(45px); }
            .face-back   { transform: rotateY(180deg) translateZ(45px); }
            .face-left   { transform: rotateY(-90deg) translateZ(45px); }
            .face-right  { transform: rotateY(90deg) translateZ(45px); }
            .face-top    { transform: rotateX(90deg) translateZ(45px); }
            .face-bottom { transform: rotateX(-90deg) translateZ(45px); }
            
            .brand-text {
                font-size: 2.4rem;
                letter-spacing: 10px;
            }
        }

        /* --- Animación de Respaldo --- */
        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="scene-3d">
            <div class="cube-3d auto-rotate" id="cube">
                <div class="cube-face face-front">X</div>
                <div class="cube-face face-back">L</div>
                <div class="cube-face face-left">J</div>
                <div class="cube-face face-right">L</div>
                <div class="cube-face face-top">·</div>
                <div class="cube-face face-bottom">·</div>
            </div>
        </div>

        <h1 class="brand-text">JXLL</h1>

        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        
        <div class="status-text" id="statusText">Initializing core...</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cube = document.getElementById("cube");
            const progressFill = document.getElementById("progressFill");
            const statusText = document.getElementById("statusText");
            
            // --- EFECTO PARALAJE INTERACTIVO (EXCLUSIVO PC) ---
            // Si detecta ratón, quita la animación automática y sigue al cursor de forma elegante
            if (window.matchMedia("(min-width: 1024px)").matches) {
                cube.classList.remove("auto-rotate");
                
                document.addEventListener("mousemove", (e) => {
                    // Calcula la posición del mouse respecto al centro de la pantalla
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
                    
                    // Rota el cubo en base a las coordenadas del puntero
                    cube.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });
            }

            // --- INTERFAZ HÁPTICA SIMULADA (OPTIMIZACIÓN SAMSUNG) ---
            // Intenta usar el motor de vibración del dispositivo Android al cambiar estados fuertes
            const triggerVibration = (ms) => {
                if (navigator.vibrate) {
                    navigator.vibrate(ms);
                }
            };

            // --- LÓGICA DE CARGA INTELIGENTE ---
            let progress = 0;
            const logMessages = [
                "Bypass sandbox verification...",
                "Mapping secure networks...",
                "Injecting UI parameters...",
                "Handshake completed."
            ];

            const loadScheduler = setInterval(() => {
                // Algoritmo de carga orgánica
                progress += Math.floor(Math.random() * 12) + 3;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loadScheduler);
                    statusText.innerText = "ACCESS GRANTED";
                    statusText.style.color = "#00ff66";
                    progressFill.style.background = "#00ff66";
                    progressFill.style.boxShadow = "0 0 15px #00ff66";
                    
                    triggerVibration([40, 40, 40]); // Patrón de éxito en Android

                    setTimeout(() => {
                        window.location.href = "inicio.html";
                    }, 700);
                }

                progressFill.style.width = `${progress}%`;

                // Actualización de logs en base al porcentaje
                if (progress > 5 && progress < 30) statusText.innerText = logMessages[0];
                if (progress > 35 && progress < 65) {
                    if(statusText.innerText !== logMessages[1]) triggerVibration(15);
                    statusText.innerText = logMessages[1];
                }
                if (progress > 65 && progress < 85) statusText.innerText = logMessages[2];
                if (progress > 85 && progress < 100) {
                    if(statusText.innerText !== logMessages[3]) triggerVibration(20);
                    statusText.innerText = logMessages[3];
                }

            }, 120); 
        });
    </script>
</body>
</html>
